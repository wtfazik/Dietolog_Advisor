services:
  - type: web
    name: professional-dietologist-web
    runtime: python
    buildCommand: pip install .
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_REQUIRE_SSL
        value: true
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PANEL_USERNAME
        sync: false
      - key: ADMIN_PANEL_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HYPERBOLIC_API_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SUPERADMIN_TELEGRAM_ID
        sync: false
      - key: LOG_LEVEL
        value: INFO
